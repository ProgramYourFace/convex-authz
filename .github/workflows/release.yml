name: Release

# Triggered when a version tag is pushed (e.g., v2.0.0, v2.1.0)
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Publish to npm + GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # needed for GitHub release creation

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for changelog extraction

      - name: Node setup
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Run tests
        run: npm run test

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the section between ## vX.Y.Z and the next ## heading
          NOTES=$(awk "/^## v${VERSION}/,/^## /{if(/^## v${VERSION}/)next; if(/^## /)exit; print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release ${GITHUB_REF_NAME}"
          fi
          # Write to file (multi-line output)
          echo "$NOTES" > /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: /tmp/release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
